<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle graph pattern in background -->
  <g opacity="0.12" stroke="#60a5fa" stroke-width="1.5" fill="none">
    <line x1="90" y1="100" x2="260" y2="180"/>
    <line x1="260" y1="180" x2="180" y2="340"/>
    <line x1="260" y1="180" x2="420" y2="260"/>
    <line x1="1020" y1="480" x2="1140" y2="560"/>
    <line x1="1020" y1="480" x2="900" y2="540"/>
    <line x1="1020" y1="480" x2="1080" y2="380"/>
  </g>
  <g opacity="0.18" fill="#60a5fa">
    <circle cx="90" cy="100" r="4"/>
    <circle cx="260" cy="180" r="6"/>
    <circle cx="180" cy="340" r="4"/>
    <circle cx="420" cy="260" r="3"/>
    <circle cx="1020" cy="480" r="6"/>
    <circle cx="1140" cy="560" r="4"/>
    <circle cx="900" cy="540" r="3"/>
    <circle cx="1080" cy="380" r="4"/>
  </g>

  <!-- Logo mark: hexagon + TS + nodes -->
  <g transform="translate(120, 200) scale(2.3)">
    <g stroke="#60a5fa" stroke-width="3" stroke-linecap="round">
      <line x1="50" y1="35" x2="50" y2="10"/>
      <line x1="65" y1="58" x2="88" y2="70"/>
      <line x1="35" y1="58" x2="12" y2="82"/>
    </g>
    <polygon points="50,30 68,42 68,62 50,74 32,62 32,42" fill="#3b82f6"/>
    <text x="50" y="58" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">TS</text>
    <circle cx="50" cy="10" r="10" fill="#93c5fd"/>
    <circle cx="88" cy="70" r="9" fill="#6aaccc"/>
    <circle cx="12" cy="82" r="11" fill="#1e40af"/>
  </g>

  <!-- Wordmark + tagline -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
    <text x="380" y="290" font-size="96" font-weight="800" fill="#f8fafc" letter-spacing="-3">TypeGraph</text>
    <text x="380" y="360" font-size="36" font-weight="500" fill="#cbd5e1">The Knowledge Graph for TypeScript</text>
    <text x="380" y="418" font-size="24" font-weight="400" fill="#94a3b8">Define with Zod. Query with a fluent builder.</text>
    <text x="380" y="452" font-size="24" font-weight="400" fill="#94a3b8">Embedded on SQLite or Postgres.</text>
  </g>

  <!-- Footer URL + accent bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)"/>
  <text x="120" y="585" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" font-weight="500" fill="#60a5fa">typegraph.dev</text>
</svg>
