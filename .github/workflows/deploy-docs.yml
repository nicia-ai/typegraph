name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      # The /changelog page is generated from this file by sync-changelog.mjs,
      # so release ("Version Packages") commits must re-trigger the docs build.
      - "packages/typegraph/CHANGELOG.md"
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  # Allows the failure-report step to open/comment on a tracking issue when an
  # unattended (release-triggered) deploy fails.
  issues: write

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `astro build` intermittently fails on a cold Vite cache: the SSR dep
      # optimizer discovers the Astro Actions runtime mid-build, re-optimizes,
      # and the workerd runner references a chunk hash the reload just
      # invalidated. The first attempt warms node_modules/.vite, so a retry
      # clears it. The warning fires even on eventual success so the flake
      # frequency stays visible in run summaries.
      - name: Build docs
        run: |
          for attempt in 1 2 3; do
            echo "::group::Build attempt $attempt"
            if pnpm --filter @nicia-ai/typegraph-docs build; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::astro build failed on attempt $attempt; retrying with warmed Vite cache"
          done
          exit 1
        env:
          NICIA_EMAIL_LIST_API_URL: ${{ secrets.NICIA_EMAIL_LIST_API_URL }}
          NICIA_EMAIL_LIST_API_KEY: ${{ secrets.NICIA_EMAIL_LIST_API_KEY }}

      - name: Deploy to Cloudflare Workers
        run: |
          # Pass PUBLIC_* vars from .env.production to wrangler
          VAR_FLAGS=()
          while IFS= read -r line; do
            VAR_FLAGS+=(--var "${line/=/:}")
          done < <(grep -E '^PUBLIC_' apps/docs/.env.production)
          pnpm --filter @nicia-ai/typegraph-docs exec wrangler deploy "${VAR_FLAGS[@]}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Release-triggered deploys run unattended, so a failure must surface
      # somewhere a human will see it. Dedup on an open tracking issue: comment
      # if one exists, otherwise create it — repeated flakes never spam.
      - name: Report deploy failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: docs-deploy-failure
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create "$LABEL" \
            --color B60205 \
            --description "Automated: Deploy Docs workflow failed on main" \
            2>/dev/null || true

          body="$(printf '%s\n' \
            "The **Deploy Docs** workflow failed on \`main\`." \
            "" \
            "- Run: $RUN_URL" \
            "- Commit: \`${GITHUB_SHA}\`" \
            "" \
            "This deploy is unattended (release/CHANGELOG pushes), so the live docs at https://typegraph.dev may be stale until resolved. A transient Vite dep-optimizer race is the usual cause — re-running the failed job typically clears it.")"

          existing="$(gh issue list --label "$LABEL" --state open --limit 1 --json number --jq '.[0].number')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "Docs deploy failed on main" --label "$LABEL" --body "$body"
          fi
