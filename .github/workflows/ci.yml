name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-release-metadata-push:
    name: Detect release metadata push
    runs-on: ubuntu-24.04
    outputs:
      skip_push_ci: ${{ steps.detect.outputs.skip_push_ci }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect release metadata-only push
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "skip_push_ci=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"

          if [[ "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            echo "skip_push_ci=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t changed_files < <(git diff --name-only "$base_sha" "$head_sha")

          if [[ "${#changed_files[@]}" -eq 0 ]]; then
            echo "skip_push_ci=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          skip_push_ci=true
          for changed_file in "${changed_files[@]}"; do
            case "$changed_file" in
              .changeset/*.md | CHANGELOG.md | */CHANGELOG.md | packages/typegraph/package.json) ;;
              *)
                skip_push_ci=false
                break
                ;;
            esac
          done

          echo "skip_push_ci=$skip_push_ci" >> "$GITHUB_OUTPUT"

  lint-and-check:
    name: Lint & Type Check
    runs-on: ubuntu-24.04
    needs: [detect-release-metadata-push]
    if: ${{ needs.detect-release-metadata-push.outputs.skip_push_ci != 'true' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm turbo run typecheck

      - name: Lint
        run: pnpm turbo run lint

      - name: Prettier
        run: pnpm prettier

      - name: Docs
        run: pnpm test:docs

      - name: Verify rendered docs and documented imports
        run: pnpm test:docs:release

      - name: Unused code check
        run: pnpm test:unused

  test-sqlite-unit:
    name: Test Unit (SQLite, Node 22, shard ${{ matrix.shard }})
    runs-on: ubuntu-24.04
    needs: [detect-release-metadata-push]
    if: ${{ needs.detect-release-metadata-push.outputs.skip_push_ci != 'true' }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/2", "2/2"]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm turbo run test:unit -- --shard=${{ matrix.shard }}

  test-sqlite-property:
    name: Test Property (SQLite, Node 24)
    runs-on: ubuntu-24.04
    needs: [detect-release-metadata-push]
    if: ${{ needs.detect-release-metadata-push.outputs.skip_push_ci != 'true' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run property tests
        run: pnpm turbo run test:property

  test-sqlite-smoke:
    name: Test Smoke (SQLite, Node 24)
    runs-on: ubuntu-24.04
    needs: [detect-release-metadata-push]
    if: ${{ needs.detect-release-metadata-push.outputs.skip_push_ci != 'true' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run SQLite perf sanity
        run: pnpm --filter @nicia-ai/typegraph-benchmarks perf:check

      - name: Run all SQLite examples
        run: pnpm test:examples

  test-strict-local-consumers:
    name: Test Strict Packed Consumers (TypeScript 5 and 6)
    runs-on: ubuntu-24.04
    needs: [detect-release-metadata-push]
    if: ${{ needs.detect-release-metadata-push.outputs.skip_push_ci != 'true' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test strict packed SQLite and PGlite consumers
        run: pnpm test:strict-local-consumers

  test-coverage:
    name: Coverage shard ${{ matrix.shard }}
    runs-on: ubuntu-24.04
    needs: [detect-release-metadata-push]
    if: ${{ needs.detect-release-metadata-push.outputs.skip_push_ci != 'true' }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: "1/2"
            artifact: coverage-blob-1
          - shard: "2/2"
            artifact: coverage-blob-2
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run coverage shard
        run: >-
          pnpm --filter @nicia-ai/typegraph exec vitest run --coverage
          --shard=${{ matrix.shard }}
          --reporter=default
          --reporter=blob
          --outputFile.blob=.vitest-reports/blob-${{ matrix.artifact }}.json
          --coverage.thresholds.branches=0
          --coverage.thresholds.functions=0
          --coverage.thresholds.lines=0

      - name: Upload coverage blob
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/typegraph/.vitest-reports/*.json
          if-no-files-found: error
          include-hidden-files: true
          overwrite: true

  test-coverage-merge:
    name: Test (Coverage)
    runs-on: ubuntu-24.04
    needs: [detect-release-metadata-push, test-coverage]
    if: >-
      ${{
        always() &&
        needs.detect-release-metadata-push.outputs.skip_push_ci != 'true' &&
        needs.test-coverage.result != 'skipped'
      }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fail when a coverage shard failed
        if: ${{ needs.test-coverage.result != 'success' }}
        run: |
          echo "Coverage shards finished with result: ${{ needs.test-coverage.result }}"
          exit 1

      - name: Download coverage blobs
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-blob-*
          path: packages/typegraph/.vitest-reports
          merge-multiple: true

      - name: Enforce merged coverage thresholds
        run: pnpm --filter @nicia-ai/typegraph test:coverage:merge

  test-typescript-compat:
    name: Type Tests (TS ${{ matrix.typescript-version }})
    runs-on: ubuntu-24.04
    needs: [detect-release-metadata-push]
    if: ${{ needs.detect-release-metadata-push.outputs.skip_push_ci != 'true' }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        typescript-version: ["5.9.3", "6.0.3"]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run layered type tests
        run: pnpm --filter @nicia-ai/typegraph test:types
        env:
          TYPEGRAPH_TYPESCRIPT_VERSION: ${{ matrix.typescript-version }}

      - name: Verify public API report
        if: matrix.typescript-version == '5.9.3'
        run: pnpm --filter @nicia-ai/typegraph test:api-report

  test-postgres:
    name: Test (PostgreSQL, shard ${{ matrix.shard }})
    runs-on: ubuntu-24.04
    needs: [detect-release-metadata-push]
    if: ${{ needs.detect-release-metadata-push.outputs.skip_push_ci != 'true' }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/2", "2/2"]
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: typegraph
          POSTGRES_PASSWORD: typegraph
          POSTGRES_DB: typegraph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U typegraph -d typegraph_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run PostgreSQL integration tests
        run: pnpm --filter @nicia-ai/typegraph test:postgres
        env:
          # Use 127.0.0.1 instead of localhost to avoid IPv6 resolution issues
          POSTGRES_URL: postgresql://typegraph:typegraph@127.0.0.1:5432/typegraph_test
          VITEST_SHARD: ${{ matrix.shard }}

      - name: Run PostgreSQL perf sanity
        if: ${{ matrix.shard == '1/2' }}
        run: pnpm --filter @nicia-ai/typegraph-benchmarks perf:check:postgres
        env:
          # Use 127.0.0.1 instead of localhost to avoid IPv6 resolution issues
          POSTGRES_URL: postgresql://typegraph:typegraph@127.0.0.1:5432/typegraph_test

      - name: Run PostgreSQL example
        if: ${{ matrix.shard == '1/2' }}
        run: pnpm test:examples:postgres
        env:
          POSTGRES_URL: postgresql://typegraph:typegraph@127.0.0.1:5432/typegraph_test

  test-durable-objects:
    name: Test (Durable Objects SQLite)
    runs-on: ubuntu-24.04
    needs: [detect-release-metadata-push]
    if: ${{ needs.detect-release-metadata-push.outputs.skip_push_ci != 'true' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Durable Objects SQLite tests (workerd)
        run: pnpm --filter @nicia-ai/typegraph test:do

  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - detect-release-metadata-push
      - lint-and-check
      - test-sqlite-unit
      - test-sqlite-property
      - test-sqlite-smoke
      - test-strict-local-consumers
      - test-coverage-merge
      - test-typescript-compat
      - test-postgres
      - test-durable-objects
    if: ${{ needs.detect-release-metadata-push.outputs.skip_push_ci != 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build
        env:
          NICIA_EMAIL_LIST_API_URL: ${{ secrets.NICIA_EMAIL_LIST_API_URL }}
          NICIA_EMAIL_LIST_API_KEY: ${{ secrets.NICIA_EMAIL_LIST_API_KEY }}

  release-metadata-push:
    name: Release metadata push check
    runs-on: ubuntu-24.04
    needs: [detect-release-metadata-push]
    if: ${{ needs.detect-release-metadata-push.outputs.skip_push_ci == 'true' }}
    steps:
      - name: Skip heavy CI on release metadata-only push
        run: echo "Skipping heavy CI for release metadata-only push to main."
